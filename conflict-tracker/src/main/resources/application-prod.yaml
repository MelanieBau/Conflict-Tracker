spring:
  datasource:
    url: ${DATABASE_CONFLICT}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  server:
    port: ${PORT:8080}

  sql:
    init:
      mode: never
      encoding: UTF-8

  h2:
    console:
      enabled: false